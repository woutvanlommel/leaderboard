services:
    mysql:
        image: mysql:8.0
        container_name: leaderboard_mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: leaderboard
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: leaderboard
            MYSQL_PASSWORD: secret
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - leaderboard

networks:
    leaderboard:
        external: true

volumes:
    mysql_data:
        driver: local
