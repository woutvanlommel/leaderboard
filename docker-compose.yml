services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leaderboard_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - leaderboard

  nginx:
    image: nginx:alpine
    container_name: leaderboard_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - leaderboard

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leaderboard_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --tries=3 --timeout=90
    networks:
      - leaderboard

  mailpit:
    image: axllent/mailpit:latest
    container_name: leaderboard_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - leaderboard

  node:
    image: node:20-alpine
    container_name: leaderboard_node
    working_dir: /var/www
    volumes:
      - .:/var/www
      - node_modules:/var/www/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - leaderboard

networks:
  leaderboard:
    external: true

volumes:
  node_modules:
    driver: local
